<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="BaseBrick Diamond Medal">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a35"/>
      <stop offset="100%" stop-color="#25528a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#9ff2ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9ff2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="medalOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5feff"/>
      <stop offset="45%" stop-color="#9fe8ff"/>
      <stop offset="100%" stop-color="#55b5e8"/>
    </linearGradient>
    <linearGradient id="medalInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c6f3ff"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#73bbff"/>
      <stop offset="100%" stop-color="#2f6fd4"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="1120" rx="34" fill="none" stroke="#b8f2ff" stroke-opacity="0.58" stroke-width="4"/>
  <circle cx="600" cy="560" r="370" fill="url(#glow)"/>
  <text x="600" y="126" fill="#dbecff" font-size="44" font-family="Verdana, Arial, sans-serif" letter-spacing="8" text-anchor="middle">BASEBRICK</text>
  <text x="600" y="180" fill="#f3feff" font-size="54" font-family="Verdana, Arial, sans-serif" font-weight="700" text-anchor="middle">DIAMOND MEDAL</text>
  <g filter="url(#shadow)">
    <path d="M462 214h88v188h-88z" fill="url(#ribbon)"/>
    <path d="M650 214h88v188h-88z" fill="url(#ribbon)"/>
    <path d="M462 402l44 70 44-70z" fill="#2d68cf"/>
    <path d="M650 402l44 70 44-70z" fill="#2d68cf"/>
    <circle cx="600" cy="605" r="255" fill="url(#medalOuter)"/>
    <circle cx="600" cy="605" r="214" fill="#61b8e2"/>
    <circle cx="600" cy="605" r="178" fill="url(#medalInner)"/>
    <circle cx="600" cy="605" r="146" fill="#7ec8ea"/>
    <polygon points="600,462 676,538 644,640 556,640 524,538" fill="#ffffff"/>
    <polyline points="524,538 600,570 676,538" fill="none" stroke="#9ce8ff" stroke-width="10"/>
    <polyline points="556,640 600,570 644,640" fill="none" stroke="#9ce8ff" stroke-width="10"/>
    <text x="600" y="742" fill="#ecfdff" font-size="62" font-family="Verdana, Arial, sans-serif" font-weight="700" text-anchor="middle">STAGE 20</text>
  </g>
  <text x="600" y="1080" fill="#eef8ff" font-size="38" font-family="Verdana, Arial, sans-serif" letter-spacing="4" text-anchor="middle">PLAY GAME WIN NFTS ON BASE</text>
</svg>
