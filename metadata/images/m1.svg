    </radialGradient>
    <linearGradient id="medalOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2c7a1"/>
      <stop offset="45%" stop-color="#cd8a57"/>
      <stop offset="100%" stop-color="#8d4f2a"/>
    </linearGradient>
    <linearGradient id="medalInner" x1="0%" y1="0%" x2="0%" y2="100%">
