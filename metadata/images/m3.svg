  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="1120" rx="34" fill="none" stroke="#ffd980" stroke-opacity="0.55" stroke-width="4"/>
  <circle cx="600" cy="560" r="370" fill="url(#glow)"/>
