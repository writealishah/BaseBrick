<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="BaseBrick Gold Medal">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1730"/>
      <stop offset="100%" stop-color="#1e406f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#ffd862" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#ffd862" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="medalOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4c3"/>
      <stop offset="45%" stop-color="#f8c83e"/>
      <stop offset="100%" stop-color="#cb8f08"/>
    </linearGradient>
    <linearGradient id="medalInner" x1="0%" y1="0%" x2="0%" y2="100%">
