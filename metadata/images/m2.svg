<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="BaseBrick Silver Medal">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1528"/>
      <stop offset="100%" stop-color="#213a64"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#d8e2f2" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#d8e2f2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="medalOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f9ff"/>
      <stop offset="45%" stop-color="#c4cfdf"/>
      <stop offset="100%" stop-color="#8f9fb8"/>
    </linearGradient>
    <linearGradient id="medalInner" x1="0%" y1="0%" x2="0%" y2="100%">
